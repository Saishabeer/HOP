# netlify.toml - House of Prime Collections Deployment Configuration

[build]
  command = "echo 'Static Site - No Build'"
  publish = "."

[functions]
  directory = "netlify/functions"

# --- REDIRECT RULES ---

# Custom 404 page
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# --- CUSTOM HEADERS ---

# Security & performance headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Moderate caching for static CSS/JS assets (since file hashing is not used)
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

# Short cache for HTML pages so updates propagate fast
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Allow Cross-origin for product data JSON
[[headers]]
  for = "/data/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"
