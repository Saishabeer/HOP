<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>House of Prime - Automated E2E & Integration Test Runner</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0e17;
      --card-dark: #121824;
      --primary-rose: #8b1a4a;
      --neon-green: #00e676;
      --neon-red: #ff1744;
      --warm-gray: #8892b0;
      --white: #ccd6f6;
      --gold: #d4af37;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--white);
      font-family: 'Outfit', sans-serif;
      padding: 40px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 1px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 0%, var(--primary-rose) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--warm-gray);
      font-size: 1.1rem;
    }

    /* Dashboard Metrics */
    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .metric-card {
      background-color: var(--card-dark);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      position: relative;
      overflow: hidden;
    }

    .metric-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: var(--primary-rose);
    }

    .metric-card.passed::before { background: var(--neon-green); }
    .metric-card.failed::before { background: var(--neon-red); }

    .metric-val {
      font-size: 2.5rem;
      font-weight: 800;
      margin-top: 8px;
      font-family: 'Fira Code', monospace;
    }

    .metric-label {
      color: var(--warm-gray);
      text-transform: uppercase;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* Controls */
    .controls {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 40px;
    }

    .btn {
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: all 0.2s ease;
    }

    .btn-run {
      background-color: var(--primary-rose);
      color: #fff;
      box-shadow: 0 4px 15px rgba(139, 26, 74, 0.4);
    }

    .btn-run:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(139, 26, 74, 0.6);
    }

    .btn-back {
      background-color: transparent;
      color: var(--warm-gray);
      border: 1px solid var(--warm-gray);
    }

    .btn-back:hover {
      color: #fff;
      border-color: #fff;
    }

    /* Test Results Console */
    .console-card {
      background-color: var(--card-dark);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.05);
      padding: 30px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.5);
    }

    .console-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 16px;
      margin-bottom: 24px;
    }

    .console-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
    }

    .test-suites {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .suite-group {
      border-left: 2px solid rgba(255,255,255,0.1);
      padding-left: 16px;
    }

    .suite-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .test-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.02);
      font-family: 'Fira Code', monospace;
      font-size: 0.9rem;
    }

    .test-name {
      color: var(--white);
    }

    .test-status {
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
    }

    .test-status.pass {
      color: var(--neon-green);
      background-color: rgba(0, 230, 118, 0.1);
    }

    .test-status.fail {
      color: var(--neon-red);
      background-color: rgba(255, 23, 68, 0.1);
    }

    .test-status.pending {
      color: var(--warm-gray);
      background-color: rgba(255, 255, 255, 0.05);
    }

    .error-details {
      margin-top: 6px;
      color: var(--neon-red);
      font-size: 0.8rem;
      padding-left: 20px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>House of Prime Test Runner</h1>
      <div class="subtitle">Automated Storefront Integration & Validation Engine</div>
    </header>

    <div class="dashboard">
      <div class="metric-card">
        <div class="metric-label">Total Tests</div>
        <div class="metric-val" id="metric-total">0</div>
      </div>
      <div class="metric-card passed">
        <div class="metric-label">Passed</div>
        <div class="metric-val" id="metric-passed" style="color: var(--neon-green)">0</div>
      </div>
      <div class="metric-card failed">
        <div class="metric-label">Failed</div>
        <div class="metric-val" id="metric-failed" style="color: var(--neon-red)">0</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-run" id="btn-run-all">Execute Test Suite</button>
      <button class="btn btn-back" onclick="window.location.href='index.html'">Back to Storefront</button>
    </div>

    <div class="console-card">
      <div class="console-header">
        <div class="console-title">Test Runner Logs</div>
        <div class="subtitle" id="execution-time">Ready</div>
      </div>
      
      <div class="test-suites" id="suites-container">
        <!-- Dynamic suites inserted here -->
      </div>
    </div>
  </div>

  <!-- Load dependencies and product data configurations -->
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>

  <script>
    const suites = [
      {
        name: "1. Authentication & Security Session",
        tests: [
          {
            name: "sessionStorage starts empty for visitors",
            fn: async () => {
              sessionStorage.removeItem('admin_token');
              const token = sessionStorage.getItem('admin_token');
              if (token !== null) throw new Error("Expected session token to be null for visitor");
            }
          },
          {
            name: "verifyAdminToken rejects empty token",
            fn: async () => {
              const res = await verifyAdminToken(null);
              if (res !== false) throw new Error("Expected null token to be rejected");
            }
          },
          {
            name: "verifyAdminToken accepts valid token",
            fn: async () => {
              // Should pass local dev mock check
              const res = await verifyAdminToken('MySuperSecretToken2026');
              if (res !== true) throw new Error("Expected verification mock to pass for AUTH_TOKEN");
            }
          }
        ]
      },
      {
        name: "2. Input Validation (Server Emulation)",
        tests: [
          {
            name: "Rejects name exceeding 100 characters",
            fn: async () => {
              const longName = "A".repeat(101);
              const result = mockServerValidate({ ProductName: longName, Price: 100, StockQuantity: 5 });
              if (result === null || !result.includes("Name must not exceed 100 characters")) {
                throw new Error("Expected validation error for name length cap. Got: " + result);
              }
            }
          },
          {
            name: "Rejects negative price",
            fn: async () => {
              const result = mockServerValidate({ ProductName: "Gold studs", Price: -10, StockQuantity: 5 });
              if (result === null || !result.includes("Price must be a valid number greater than 0")) {
                throw new Error("Expected validation error for negative price. Got: " + result);
              }
            }
          },
          {
            name: "Rejects non-integer or negative stock quantity",
            fn: async () => {
              const result = mockServerValidate({ ProductName: "Gold studs", Price: 100, StockQuantity: -2 });
              if (result === null || !result.includes("Stock Quantity must be a valid non-negative number")) {
                throw new Error("Expected validation error for negative stock. Got: " + result);
              }
            }
          },
          {
            name: "Rejects description exceeding 500 characters",
            fn: async () => {
              const longDesc = "D".repeat(501);
              const result = mockServerValidate({ ProductName: "Gold studs", Price: 100, StockQuantity: 5, Description: longDesc });
              if (result === null || !result.includes("Description must not exceed 500 characters")) {
                throw new Error("Expected validation error for description length cap. Got: " + result);
              }
            }
          }
        ]
      },
      {
        name: "3. Delivery & Cart Calculations",
        tests: [
          {
            name: "Calculates default shipping (Rs. 50) below threshold",
            fn: async () => {
              const shipping = getShippingCost(150);
              if (shipping !== 50) throw new Error(`Expected Rs.50 shipping for Rs.150 cart value, got: Rs.${shipping}`);
            }
          },
          {
            name: "Applies free shipping above Rs. 500 threshold",
            fn: async () => {
              const shipping = getShippingCost(550);
              if (shipping !== 0) throw new Error(`Expected free shipping (0) for Rs.550 cart value, got: Rs.${shipping}`);
            }
          }
        ]
      },
      {
        name: "4. Database Integration & Sheets Edit Flow",
        tests: [
          {
            name: "editProductOnSheets returns success status locally",
            fn: async () => {
              const res = await editProductOnSheets('MySuperSecretToken2026', {
                ProductID: 'P00001',
                ProductName: 'Mock Product',
                Price: 120,
                StockQuantity: 10
              });
              if (!res.success) throw new Error("Expected success status on local mock edit call");
            }
          },
          {
            name: "deleteProductOnSheets performs soft-delete status update locally",
            fn: async () => {
              const res = await deleteProductOnSheets('MySuperSecretToken2026', 'P00001');
              if (!res.success) throw new Error("Expected success status on local mock delete call");
            }
          }
        ]
      }
    ];

    // Helper functions matching Code.gs and global cart calculation patterns
    function mockServerValidate(product) {
      if (!product.ProductName || product.ProductName.trim() === '') return 'Product Name is required';
      if (product.ProductName.length > 100) return 'Product Name must not exceed 100 characters';
      
      const price = Number(product.Price);
      if (isNaN(price) || price <= 0) return 'Price must be a valid number greater than 0';

      const stock = Number(product.StockQuantity);
      if (isNaN(stock) || stock < 0) return 'Stock Quantity must be a valid non-negative number';

      if (product.Description && product.Description.length > 500) return 'Description must not exceed 500 characters';
      
      return null; // Passes validation
    }

    function getShippingCost(subtotal) {
      return subtotal >= CONFIG.FREE_SHIPPING_THRESHOLD ? 0 : CONFIG.DEFAULT_SHIPPING;
    }

    // Render Initial State
    const container = document.getElementById('suites-container');
    let totalTestsCount = 0;

    suites.forEach((suite, sIdx) => {
      const suiteDiv = document.createElement('div');
      suiteDiv.className = 'suite-group';
      suiteDiv.innerHTML = `<div class="suite-title">${suite.name}</div>`;
      
      suite.tests.forEach((test, tIdx) => {
        totalTestsCount++;
        const testDiv = document.createElement('div');
        testDiv.className = 'test-item';
        testDiv.id = `test-${sIdx}-${tIdx}`;
        testDiv.innerHTML = `
          <span class="test-name">${test.name}</span>
          <span class="test-status pending" id="status-${sIdx}-${tIdx}">PENDING</span>
        `;
        suiteDiv.appendChild(testDiv);
      });
      container.appendChild(suiteDiv);
    });

    document.getElementById('metric-total').textContent = totalTestsCount;

    // Run tests handler
    document.getElementById('btn-run-all').addEventListener('click', async () => {
      document.getElementById('execution-time').textContent = "Running tests...";
      let passed = 0;
      let failed = 0;
      const startTime = performance.now();

      for (let sIdx = 0; sIdx < suites.length; sIdx++) {
        const suite = suites[sIdx];
        for (let tIdx = 0; tIdx < suite.tests.length; tIdx++) {
          const test = suite.tests[tIdx];
          const statusEl = document.getElementById(`status-${sIdx}-${tIdx}`);
          const itemEl = document.getElementById(`test-${sIdx}-${tIdx}`);

          try {
            await test.fn();
            statusEl.textContent = "PASS";
            statusEl.className = "test-status pass";
            passed++;
          } catch (err) {
            statusEl.textContent = "FAIL";
            statusEl.className = "test-status fail";
            failed++;
            
            // Append error details
            const errDiv = document.createElement('div');
            errDiv.className = 'error-details';
            errDiv.textContent = `↳ ${err.message}`;
            itemEl.parentNode.insertBefore(errDiv, itemEl.nextSibling);
          }

          document.getElementById('metric-passed').textContent = passed;
          document.getElementById('metric-failed').textContent = failed;
        }
      }

      const duration = ((performance.now() - startTime) / 1000).toFixed(2);
      document.getElementById('execution-time').textContent = `Completed in ${duration}s`;
    });
  </script>
</body>
</html>
