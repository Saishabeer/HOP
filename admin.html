<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>(function(){try{var t=localStorage.getItem('hop_theme');if(t==='dark'||t==='light')document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <link rel="icon" type="image/png" href="icons/icon-512.png">
  <title>Admin Panel | House of Prime Collections</title>
  
  <link rel="stylesheet" href="css/tokens.css?v=9">
  <link rel="stylesheet" href="css/reset.css?v=9">
  <link rel="stylesheet" href="css/global.css?v=9">
  <link rel="stylesheet" href="css/components.css?v=9">
  
  <style>
    * {
      box-sizing: border-box;
    }
    body { background-color: var(--velvet-cream); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    
    .admin-container { background: var(--ivory-white); padding: 2rem; border-radius: 12px; box-shadow: 0 8px 24px rgba(139,26,74,0.12); width: 100%; max-width: 600px; display: none; }
    .login-container { background: var(--ivory-white); padding: 2rem; border-radius: 12px; box-shadow: 0 8px 24px rgba(139,26,74,0.12); width: 100%; max-width: 400px; text-align: center; display: none; }

    .admin-container.active, .login-container.active { display: block; }

    .form-group { margin-bottom: 1.5rem; width: 100%; }
    .form-row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .form-row > .form-group { flex: 1; min-width: 200px; }

    .form-label { display: block; margin-bottom: 0.5rem; font-family: 'DM Sans', sans-serif; font-weight: 500; color: var(--deep-charcoal); }
    .form-input, .form-select, .form-textarea { width: 100%; padding: 0.75rem; border: 1px solid var(--velvet-cream); border-radius: 4px; font-family: 'Lato', sans-serif; font-size: 16px; background-color: var(--ivory-white); color: var(--deep-charcoal); }
    .form-textarea { resize: vertical; min-height: 100px; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary-rose); }
    .form-input:disabled, .form-select:disabled, .form-textarea:disabled { background-color: var(--velvet-cream); cursor: not-allowed; opacity: 0.7; }

    .password-field { position: relative; }
    .password-field .form-input { padding-right: 44px; }
    .password-field__toggle { position: absolute; top: 0; right: 0; height: 100%; width: 44px; display: flex; align-items: center; justify-content: center; color: var(--warm-gray); background: none; border: none; cursor: pointer; }
    .password-field__toggle:hover { color: var(--primary-rose); }

    .header-logo { font-family: 'Cormorant Garamond', serif; font-size: 32px; color: var(--primary-rose); margin-bottom: 0.5rem; font-weight: 700; text-align: center; }
    .header-sub { font-family: 'DM Sans', sans-serif; font-size: 14px; letter-spacing: 2px; color: var(--deep-charcoal); text-align: center; margin-bottom: 2rem; }

    .image-preview-container { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    .image-preview { width: 80px; height: 80px; object-fit: cover; border-radius: 4px; border: 1px solid var(--velvet-cream); }

    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--toast-bg); color: var(--text-on-accent); padding: 12px 24px; border-radius: 4px; opacity: 0; transition: all 0.3s ease; z-index: 1000; text-align: center; max-width: 90%; word-break: break-word; }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.error { background: #d32f2f; }
    .toast.success { background: #388e3c; }
    
    /* Loading overlay */
    .loader { display: none; border: 3px solid #f3f3f3; border-top: 3px solid var(--primary-rose); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 0 auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- TOAST NOTIFICATION -->
  <div id="toast" class="toast"></div>

  <!-- LOGIN SECTION -->
  <div id="login-section" class="login-container active">
    <div class="header-logo">HOUSE OF PRIME</div>
    <div class="header-sub">ADMINISTRATION</div>
    <div class="form-group">
      <label class="form-label" for="admin-password">Admin Password</label>
      <div class="password-field">
        <input type="password" id="admin-password" class="form-input" placeholder="Enter secure password" autocomplete="current-password">
        <button type="button" id="toggle-password-visibility" class="password-field__toggle" aria-label="Show password">
          <svg class="eye-open" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eye-closed" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.4 18.4 0 0 1 5.06-5.94M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>
    <button id="login-btn" class="btn btn-primary" style="width: 100%;">
      <span id="login-text">Login to Dashboard</span>
      <div id="login-loader" class="loader"></div>
    </button>
  </div>

  <!-- Note: The actual Admin tools (Add Product, Edit, Delete) are now seamlessly integrated
       into the storefront (index.html, shop.html) via js/admin-controls.js.
       Once logged in here, you are redirected back to the storefront where the tools will appear. -->

    <!-- utils — load first -->
  <script src="js/utils/sanitize.js?v=9" defer></script>
  <script src="js/utils/debounce.js?v=9" defer></script>
  <script src="js/utils/logger.js?v=9" defer></script>
  <script src="js/theme.js?v=9" defer></script>
  <script src="js/utils/validator.js?v=9" defer></script>
  <script src="js/utils/formatter.js?v=9" defer></script>
    <!-- shared services & ui -->
  <script src="js/services/ImageService.js?v=9" defer></script>
  <script src="js/ui/Toast.js?v=9" defer></script>
  <script src="js/ui/Skeleton.js?v=9" defer></script>
  <script src="js/ui/ProductCard.js?v=9" defer></script>
  <!-- core scripts -->
  <script src="js/config.js?v=9" defer></script>
  <script src="js/lib/data.js?v=9" defer></script>
  <script src="js/lib/sheetsWriter.js?v=9" defer></script>
  <script src="js/admin.js?v=9" defer></script>
</body>
</html>
